name: Daily P/L Dashboard Refresh

on:
  schedule:
    - cron: '30 7 * * *'   # 1:00 PM IST = 07:30 UTC every day
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit data.json + snapshots.json back to repo
      issues: write         # Needed to open an issue on workflow failure

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run dashboard refresh script
        run: python scripts/refresh.py

      - name: Commit and push updated files
        run: |
          git config user.name  "Dashboard Bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add data.json snapshots.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "Auto-refresh: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push

      - name: Notify on failure (open GitHub issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Daily P/L refresh failed — ${today}`;
            const body = [
              `The daily dashboard refresh workflow failed on ${today}.`,
              ``,
              `**Run:** ${runUrl}`,
              ``,
              `Likely causes:`,
              `- Google Sheets tab renamed or permissions revoked`,
              `- Rate limit on gviz export`,
              `- Parsing regression in \`scripts/refresh.py\``,
              ``,
              `The dashboard is still serving the last successful refresh. Investigate and re-run manually from the Actions tab once fixed.`,
            ].join('\n');
            // Dedupe: don't open a new issue if one is already open for today
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'refresh-failure',
            });
            if (existing.data.some(i => i.title === title)) {
              console.log('Issue already exists for today — skipping.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['refresh-failure'],
            });
